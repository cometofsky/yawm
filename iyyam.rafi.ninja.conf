server {
    # Listen on HTTP for now. Certbot will automatically inject SSL/HTTPS configuration here later.
    listen 80;
    listen [::]:80;
    
    server_name iyyam.rafi.ninja yawm.rafi.ninja;

    # The root directory MUST point to the `/out` folder generated by `npm run build`
    root ~/apps/yawm/web/out;
    index index.html;

    # -----------------------------
    # SECURITY HEADERS
    # -----------------------------
    
    # Hide Nginx version number from error pages and HTTP headers
    server_tokens off;

    # Prevent Clickjacking by ensuring the site can only be framed by itself
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Enable browser's built-in XSS filter
    add_header X-XSS-Protection "1; mode=block" always;

    # Prevent MIME-sniffing (forces browsers to respect the provided Content-Type)
    add_header X-Content-Type-Options "nosniff" always;

    # Control how much referrer information is sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------
    # ROUTING & CACHING
    # -----------------------------

    # Main routing for Next.js Static Export
    location / {
        # Tries to find the exact file, then a directory, then falls back to 404
        try_files $uri $uri.html $uri/ =404;
    }

    # Optimize caching for static assets (CSS, JS, images) generated by Next.js
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
        
        # Ensure security headers are also applied to static assets
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Block access to hidden files (e.g., .env, .git, .github)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
